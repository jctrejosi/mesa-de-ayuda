version: "3.9"

services:
  mysql:
    image: mysql:8.4

    container_name: helpdesk_mysql

    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: helpdesk
      MYSQL_USER: helpdesk
      MYSQL_PASSWORD: helpdesk

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro

volumes:
  mysql_data: